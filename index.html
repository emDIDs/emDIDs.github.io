<!DOCTYPE html>
<html>
  <head>
    <title>emDID test space</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="utf-8" />
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
  </head>
  <body>
    <p>Welcome to our super amazing (and public) DID workspace.</p>
    <div id="ggb-element">
      <script>
        var params = {
          appName: 'graphing',
          width: 800,
          height: 600,
          showToolBar: true,
          showAlgebraInput: true,
          showMenuBar: true,
          showAnimationButton: false,
          enableUndoRedo: false,
          buttonShadows: false,
          buttonBorderColor: '#8feb34',
          buttonRounding: 0,
        };
        var applet = new GGBApplet(params, true);
        window.addEventListener('load', function () {
          applet.inject('ggb-element');
        });
      </script>
    </div>
  </body>
</html>
